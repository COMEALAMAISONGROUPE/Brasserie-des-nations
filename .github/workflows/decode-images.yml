name: Decode Chunked Base64 to Binary JPEG

on:
  push:
    paths:
      - 'assets/images/plats/*.b64.part*.txt'
  workflow_dispatch:

jobs:
  decode-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Decode chunked base64 to binary JPEG
        run: |
          python3 << 'PYEOF'
          import os, base64, glob, re
          
          plats_dir = 'assets/images/plats'
          
          part_files = sorted(glob.glob(f'{plats_dir}/*.b64.part*.txt'))
          print(f'Found {len(part_files)} chunk files')
          
          images = {}
          for f in part_files:
              basename = os.path.basename(f)
              m = re.match(r'^(.+)\.b64\.part(\d+)\.txt$', basename)
              if m:
                  img_name = m.group(1)
                  part_num = int(m.group(2))
                  if img_name not in images:
                      images[img_name] = []
                  images[img_name].append((part_num, f))
          
          print(f'Images found: {list(images.keys())}')
          
          targets = {
              'tarte': 'tarte-citron-meringuee-dessert-maison-brasserie-nations.jpg',
              'bouchee': 'bouchee-a-la-reine-specialite-brasserie-nations.jpg',
          }
          
          for img_name, parts in images.items():
              parts.sort(key=lambda x: x[0])
              print(f'Processing {img_name}: {len(parts)} chunks')
              full_b64 = ''
              for part_num, part_file in parts:
                  with open(part_file, 'r') as f:
                      chunk = f.read().strip()
                  full_b64 += chunk
                  print(f'  Part {part_num}: +{len(chunk)} chars (total: {len(full_b64)})')
              try:
                  binary_data = base64.b64decode(full_b64)
                  print(f'  Decoded: {len(binary_data)} bytes, header: {binary_data[:4].hex()}')
                  if binary_data[:2] == b'\xff\xd8':
                      target = targets.get(img_name, f'{img_name}.jpg')
                      output_path = f'{plats_dir}/{target}'
                      with open(output_path, 'wb') as f:
                          f.write(binary_data)
                      print(f'  Written to: {output_path}')
                  else:
                      print(f'  ERROR: Not a valid JPEG!')
              except Exception as e:
                  print(f'  ERROR decoding: {e}')
          PYEOF
      
      - name: Commit binary JPEGs and remove chunk files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "assets/images/plats/tarte-citron-meringuee-dessert-maison-brasserie-nations.jpg" 2>/dev/null || true
          git add "assets/images/plats/bouchee-a-la-reine-specialite-brasserie-nations.jpg" 2>/dev/null || true
          find assets/images/plats -name "*.b64.part*.txt" -exec git rm --cached {} \; 2>/dev/null || true
          find assets/images/plats -name "*.b64.part*.txt" -delete 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Upload binary JPEG images from base64 chunks [skip ci]"
            git push
            echo "Successfully committed binary JPEG files!"
          fi
