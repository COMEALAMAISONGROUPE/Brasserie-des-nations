name: Decode Base64 Images to Binary JPEG

on:
  push:
    paths:
      - 'assets/images/plats/*.b64.txt'
  workflow_dispatch:

jobs:
  decode-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Decode base64 text files to binary JPEG
        run: |
          python3 << 'PYEOF'
          import os
          import base64
          import glob
          
          plats_dir = 'assets/images/plats'
          decoded_files = []
          
          for b64_file in glob.glob(f'{plats_dir}/*.b64.txt'):
              print(f'Processing: {b64_file}')
              with open(b64_file, 'r') as f:
                  b64_content = f.read().strip()
              b64_content = ''.join(b64_content.split())
              try:
                  binary_data = base64.b64decode(b64_content)
                  if binary_data[:2] == b'\xff\xd8':
                      output_file = b64_file[:-8]
                      if not output_file.endswith('.jpg'):
                          output_file += '.jpg'
                      with open(output_file, 'wb') as f:
                          f.write(binary_data)
                      print(f'  Decoded: {output_file} ({len(binary_data)} bytes)')
                      decoded_files.append((b64_file, output_file))
                  else:
                      print(f'  WARNING: Not valid JPEG: {binary_data[:4].hex()}')
              except Exception as e:
                  print(f'  ERROR: {e}')
          if decoded_files:
              print(f'Decoded {len(decoded_files)} files successfully')
          else:
              print('No files decoded')
          PYEOF
      
      - name: Commit binary JPEG files and remove temp files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/plats/*.jpg 2>/dev/null || true
          for f in assets/images/plats/*.b64.txt; do
            [ -f "$f" ] && git rm --cached "$f" 2>/dev/null || true
            rm -f "$f"
          done
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Convert base64 text to binary JPEG images [skip ci]"
            git push
          fi
